spring.application.name=webshop-auth-server
server.port=${PORT:8080}
app.jwt.issuer=${JWT_ISSUER:http://localhost:8080}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.jwt.key-id=${JWT_KEY_ID:jwt-key-1}
app.jwt.public-key=${JWT_PUBLIC_KEY}
app.jwt.private-key=${JWT_PRIVATE_KEY}
spring.jpa.hibernate.ddl-auto=none
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect